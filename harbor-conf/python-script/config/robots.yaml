# Example system-level robot account (has access across all projects):
# - name: example-system-robot
#   description: System-level robot for CI/CD
#   duration: -1                           # Duration in days (-1 = never expires)
#   disable: false                         # Disable the robot account
#   permissions:
#     # System-level permissions (namespace must be "/")
#     - kind: system
#       namespace: /
#       access:
#         - resource: project              # Resource type
#           action: list                   # Action: create, delete, list, read, update, push, pull, etc.
#           effect: allow                  # Effect: allow or deny (default: allow)
#         - resource: registry
#           action: read
#           effect: allow
#     # Project-level permissions (namespace is project name)
#     - kind: project
#       namespace: my-project
#       access:
#         - resource: repository
#           action: pull
#           effect: allow
#         - resource: repository
#           action: push
#           effect: allow
#         - resource: artifact
#           action: read
#           effect: allow
#         # Example of deny rule
#         - resource: artifact
#           action: delete
#           effect: deny

- name: chorus-local
  permissions:
    - kind: system
      namespace: /
      access:
        - resource: project
          action: list
        - resource: registry
          action: list
        - resource: registry
          action: read
    - kind: project
      namespace: apps
      access:
        - resource: artifact
          action: list
        - resource: artifact
          action: read
        - resource: repository
          action: list
        - resource: repository
          action: pull
        - resource: repository
          action: read
        - resource: tag
          action: list
    - kind: project
      namespace: chorus
      access:
        - resource: repository
          action: list
        - resource: repository
          action: pull
        - resource: repository
          action: read
    - kind: project
      namespace: services
      access:
        - resource: repository
          action: list
        - resource: repository
          action: pull
        - resource: repository
          action: read
    - kind: project
      namespace: docker_proxy
      access:
        - resource: artifact
          action: list
        - resource: artifact
          action: read
        - resource: repository
          action: list
        - resource: repository
          action: pull
        - resource: repository
          action: read
        - resource: tag
          action: list

