{{- if and .Values.chorusNetworkPolicy.enabled (not .Values.chorusNetworkPolicy.enabled_l7_waf) }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-postgresql-chorus
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Default: Allow ingress on PostgreSQL port from same namespace only
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Release.Namespace | quote }}
    ports:
    - protocol: TCP
      port: 5432
  # Default: Allow Prometheus to scrape postgres_exporter
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ .Values.chorusNetworkPolicy.prometheusNamespace | default "prometheus" }}
    ports:
    - protocol: TCP
      port: {{ .Values.chorusNetworkPolicy.metricsPort | default 9187 }}
  {{- with .Values.chorusNetworkPolicy.ingress }}
    {{- toYaml . | nindent 2 }}
  {{- end }}
  {{- if .Values.chorusNetworkPolicy.egress }}
  egress:
    {{- toYaml .Values.chorusNetworkPolicy.egress | nindent 2 }}
  {{- else }}
  egress: [] # Deny all egress for database (empty array = no rules)
  {{- end }}
{{- end }} 
