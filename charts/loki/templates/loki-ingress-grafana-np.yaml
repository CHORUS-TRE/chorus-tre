{{- if and (.Values.networkPolicy.enabled) (eq .Values.networkPolicy.flavor "kubernetes") }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "loki.name" . }}-ingress-grafana
  namespace: {{ include "loki.namespace" . }}
  labels:
    app.kubernetes.io/instance: {{ include "loki.fullname" . }}
    app.kubernetes.io/name: {{ include "loki.name" . }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "loki.name" . }}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: prometheus
      podSelector:
        matchLabels:
          app.kubernetes.io/name: grafana
    ports:
    - port: http-metrics
      protocol: TCP
{{- end }}
