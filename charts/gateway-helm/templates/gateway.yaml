apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: chorus-gateway
  namespace: envoy-gateway-system
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.tls.clusterIssuer | quote }}
spec:
  gatewayClassName: eg
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      hostname: {{ .Values.tls.hostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ .Values.tls.secretName | quote }}
      allowedRoutes:
        namespaces:
          # Allow HTTPRoutes from any namespace — service charts deploy routes in their own namespaces.
          from: All
