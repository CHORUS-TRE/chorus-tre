{{- if .Values.tls.listeners }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: chorus-gateway
  namespace: envoy-gateway-system
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.tls.clusterIssuer | quote }}
spec:
  gatewayClassName: eg
  listeners:
    {{- range .Values.tls.listeners }}
    {{- /* Name derived from hostname: dots and * replaced. Hostnames must be distinct enough to avoid collisions. */}}
    - name: {{ required "listener.hostname is required" .hostname | replace "." "-" | replace "*" "wildcard" }}
      port: 443
      protocol: HTTPS
      hostname: {{ .hostname | quote }}
      tls:
        mode: Terminate
        certificateRefs:
          - name: {{ required "listener.secretName is required" .secretName | quote }}
      allowedRoutes:
        namespaces:
          # Allow HTTPRoutes from any namespace — service charts deploy routes in their own namespaces.
          from: All
    {{- end }}
{{- end }}
