apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: chorus-proxy
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        # externalTrafficPolicy: Local is required so that SecurityPolicy clientCIDRs
        # sees the real source IP (pod IP or external IP) rather than the node IP.
        # loadBalancerSourceRanges is intentionally NOT used here: Cilium masquerades
        # pod IPs to node IPs for traffic egressing to the MetalLB VIP, so a pod CIDR
        # filter at the LB level would incorrectly block workspace pods.
        # Pod CIDR restriction is enforced at the application layer via SecurityPolicy.
        externalTrafficPolicy: Local
