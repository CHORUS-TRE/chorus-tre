{{- if not .Values.podCIDR -}}
  {{- fail "podCIDR is required: set it to the cluster pod CIDR." -}}
{{- end -}}
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: chorus-proxy
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        externalTrafficPolicy: Local
        loadBalancerSourceRanges:
          - {{ .Values.podCIDR | quote }}
