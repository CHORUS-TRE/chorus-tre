{{- if and .Values.chorusNetworkPolicy.enabled .Values.chorusNetworkPolicy.enabled_l7_waf }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Release.Name }}-sync-egress
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "juicefs-operator.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: juicefs-operator
  egress:
  # In-cluster CoreDNS (clusters without node-local-dns).
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        app: coredns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  # node-local-dns runs hostNetwork=true on a link-local IP (169.254.x.x);
  # Cilium classifies that as the "world" entity. Bounded to port 53 only.
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  - toFQDNs:
    - matchName: {{ required "cronSync.source.host is required when chorusNetworkPolicy is enabled" .Values.cronSync.source.host | quote }}
    {{- if and .Values.cronSync.replica.host (ne .Values.cronSync.replica.host .Values.cronSync.source.host) }}
    - matchName: {{ .Values.cronSync.replica.host | quote }}
    {{- end }}
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
{{- end }}
