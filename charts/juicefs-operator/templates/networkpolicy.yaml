{{- if and .Values.chorusNetworkPolicy.enabled (not .Values.chorusNetworkPolicy.enabled_l7_waf) }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-sync-egress
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "juicefs-operator.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: juicefs-operator
  policyTypes:
  - Egress
  egress:
  # DNS to anywhere on port 53 only. Cannot restrict by selector because
  # node-local-dns runs hostNetwork on a link-local IP outside the cluster
  # namespace/pod model.
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # S3 endpoints (source + replica). Plain k8s NP cannot match FQDNs and
  # Exoscale SOS does not publish a stable CIDR list, so this is TCP 443 to
  # any. The CiliumNetworkPolicy variant carries the tight toFQDNs restriction.
  - ports:
    - port: 443
      protocol: TCP
{{- end }}
