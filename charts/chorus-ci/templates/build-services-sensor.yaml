{{- $fullName := include "chorus-ci.fullname" . -}}
{{- $serviceAccountName := include "chorus-ci.serviceAccountName" . -}}
{{- $githubSecretName := .Values.gitCredentials.secretName | default "argo-workflows-github-images" }}
{{- $githubSecretUsernameKey := .Values.gitCredentials.usernameKey | default "username" }}
{{- $githubSecretPasswordKey := .Values.gitCredentials.passwordKey | default "password" }}
apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: {{ $fullName }}-build-services
  labels:
    {{- include "chorus-ci.labels" . | nindent 4 }}
spec:
  eventBusName: {{ $fullName }}-default
  template:
    serviceAccountName: {{ $serviceAccountName }}
  dependencies:
    - name: build-services
      eventSourceName: {{ $fullName }}-github
      eventName: ci
      filters:
        data:
          - path: "[body.commits.#.modified.#()#,body.commits.#.added.#()#,body.commits.#.removed.#()#]"
            type: string
            value:
              - "services/*/.*"

          - path: "body.ref"
            type: string
            value:
              - "refs/heads/master"

  triggers:
    - template:
        name: github-workflow-trigger-services
        k8s:
          operation: create
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: "-"
              spec:
                serviceAccountName: {{ $serviceAccountName }}
                entrypoint: build-services

                arguments:
                  parameters:
                    - name: repo-url
                    - name: revision
                    - name: ref
                    - name: commit_id
                    - name: added
                    - name: removed
                    - name: modified

                templates:
                  - name: build-services
                    steps:
                      - - name: get-paths
                          template: get-paths

                      - - name: publish-chart
                          templateRef:
                            name: {{ $fullName }}-helm-publish-template
                            template: helm-publish
                          arguments:
                            parameters:
                              - name: chartsDir
                                value: "services"
                              - name: chartName
                                value: "{{`{{item.name}}`}}"
                              - name: registry
                                value: {{ .Values.sensor.registry | quote }}
                              - name: dockerConfigSecret
                                value: {{ .Values.sensor.dockerConfig.secretName | quote }}
                              - name: chartsProject
                                value: "services"
                            artifacts:
                              - name: source
                                path: /src
                                git:
                                  repo: "{{`{{workflow.parameters.repo-url}}`}}"
                                  revision: "{{`{{workflow.parameters.revision}}`}}"
                                  usernameSecret:
                                    name: {{ $githubSecretName }}
                                    key: {{ $githubSecretUsernameKey }}
                                  passwordSecret:
                                    name: {{ $githubSecretName }}
                                    key: {{ $githubSecretPasswordKey }}
                                  depth: 1
                                  ref: "{{`{{workflow.parameters.ref}}`}}"
                          # This loops over the service names from get-paths
                          withParam: "{{`{{steps.get-paths.outputs.result}}`}}"

                  - name: get-paths
                    script:
                      image: {{ .Values.chorusImages.python.imageDomain | default .Values.global.imageDomain }}/{{ .Values.chorusImages.python.imageNamespace | default .Values.global.imageNamespace }}/python:{{ .Values.chorusImages.python.tag | default "latest" }}
                      command: [python]
                      source: |
                        import json, re, sys

                        paths = (
                          {{`{{workflow.parameters.added}}`}} +
                          {{`{{workflow.parameters.removed}}`}} +
                          {{`{{workflow.parameters.modified}}`}}
                        )

                        pattern = re.compile("^services/([^/]+)/")

                        def keep_matching(strs, pattern):
                          """Keep the string matching the pattern."""
                          for x in strs:
                            if m := pattern.match(x):
                              yield m.group(1)

                        unique_names = list(set(keep_matching(paths, pattern)))
                        json.dump([{"name": n} for n in unique_names], sys.stdout)

          parameters:
            - src:
                dependencyName: build-services
                dataKey: body.repository.clone_url
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: build-services
                dataKey: body.after
              dest: spec.arguments.parameters.1.value
            - src:
                dependencyName: build-services
                dataKey: body.ref
              dest: spec.arguments.parameters.2.value
            - src:
                dependencyName: build-services
                dataTemplate: "{{`{{ .Input.body.head_commit.id | substr 0 7 }}`}}"
              dest: spec.arguments.parameters.3.value
            - src:
                dependencyName: build-services
                dataKey: body.head_commit.added
              dest: spec.arguments.parameters.4.value
            - src:
                dependencyName: build-services
                dataKey: body.head_commit.removed
              dest: spec.arguments.parameters.5.value
            - src:
                dependencyName: build-services
                dataKey: body.head_commit.modified
              dest: spec.arguments.parameters.6.value
            # Append text and commit id to dynamically assign workflow name
            - src:
                dependencyName: build-services
                dataTemplate: "build-services-{{`{{ .Input.body.head_commit.id | substr 0 7 }}`}}"
              dest: metadata.generateName
              operation: prepend
      retryStrategy:
        steps: 3
