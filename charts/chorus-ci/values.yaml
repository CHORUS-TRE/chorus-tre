# Default values for chorus-ci.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

sensor:
  # Where the OCI images built by the sensor are pushed to.
  registry: harbor.build.chorus-tre.local
  # This secret shall be of type kubernetes.io/dockerconfigjson
  dockerConfig:
    secretName: regcred

global:
  imageDomain: "harbor.build.chorus-tre.ch"
  imageNamespace: "docker_proxy/library"

# Default workflow settings
workflow:
  dockerDataStorage:
    storageClassName: ""
    storageRequest: "150Gi"

# Workflow settings for specific components
template:
  docker:
    tag: "28.1.1"
  helm:
    imageNamespace: "docker_proxy/alpine"
    tag: "3"
  kubectl:
    imageNamespace: "docker_proxy/alpine"
    tag: "1.34.1"
  k8s:
    imageNamespace: "docker_proxy/alpine"
    tag: "1.31.13"

testConnection:
  busybox:
    tag: "1.37.0"

chorusWorkbenchOperator:
  # cert-manager v1.16.2 only supports Kubernetes <= 1.32.
  # See https://cert-manager.io/docs/releases/
  kubernetesVersion: "1.32"
  dockerDataStorage:
    storageClassName: ""
    storageRequest: ""
  golang:
    tag: "1.25-bookworm"

chorusBackend:
  dockerDataStorage:
    storageClassName: ""
    storageRequest: "20Gi"
  golang:
    tag: "1.24.3-bookworm"
  jq:
    imageNamespace: "docker_proxy/backplane"
    tag: "latest" # this is the only tag available
  acceptanceRepository: "backend-acceptance"
  masterRepository: "backend-master"
  acceptanceTestsNamespace: "chorus-backend-acceptance"

chorusWebui:
  dockerDataStorage:
    storageClassName: ""
    storageRequest: ""
  node:
    tag: "22-bookworm"

chorusImages:
  dockerDataStorage:
    storageClassName: ""
    storageRequest: ""
  python:
    tag: "3.12-alpine"
  docker:
    tag: "28.1.1"

# EventBus configuration
eventBus:
  jetstream:
    version: "2.10.10"
  debug: false

# GitHub App configuration for EventSource authentication
# When enabled and webhookEvents[].webhookSecretName is set, EventSource will use GitHub App for webhook management
githubApp:
  enabled: false
  appID: ""
  installationID: ""
  privateKeySecret:
    name: "" # e.g. chorus-build-argo-workflows-github-app
    key: "privateKey"

# Git credentials for workflow git operations (single shared PAT for all repositories)
gitCredentials:
  secretName: "" # e.g. chorus-build-argo-workflows-github-pat
  usernameKey: "username"
  passwordKey: "password"

# Creates the webhook and matching events on the GitHub EventSource.
# For each webhook event:
# - If githubApp.enabled=true AND webhookSecretName is set: Use GitHub App authentication
# - Otherwise: Use legacy PAT authentication via secretName
webhookEvents:
  - name: ci
    repositories:
      - owner: chorus-tre
        names:
          - images

    # Legacy PAT-based authentication (used when githubApp.enabled=false or webhookSecretName is empty)
    # Secret must contain: token (GitHub PAT) and secret (webhook secret)
    secretName: chorus-ci-github-images

    # GitHub App authentication (used when githubApp.enabled=true AND this is set)
    # References a secret containing only the webhook signature validation secret
    webhookSecretName: "" # e.g. images-webhook
    webhookSecretKey: webhookSecret

  - name: chorus-web-ui
    repositories:
      - owner: chorus-tre
        names:
          - chorus-web-ui
    secretName: chorus-ci-github-chorus-web-ui
    webhookSecretName: "" # e.g. chorus-web-ui-webhook
    webhookSecretKey: webhookSecret

  - name: chorus-backend
    repositories:
      - owner: chorus-tre
        names:
          - chorus-backend
    secretName: chorus-ci-github-chorus-backend
    webhookSecretName: "" # e.g. chorus-backend-webhook
    webhookSecretKey: webhookSecret

  - name: workbench-operator
    repositories:
      - owner: chorus-tre
        names:
          - workbench-operator
    secretName: chorus-ci-github-workbench-operator
    webhookSecretName: "" # e.g. workbench-operator-webhook
    webhookSecretKey: webhookSecret

# DEPRECATED: Use gitCredentials instead. This map is kept for backward compatibility.
# References to secrets containing git credentials (username/password) for workflow git operations.
githubSecrets:
  chorus-backend: argo-workflows-github-chorus-backend
  chorus-web-ui: argo-workflows-github-chorus-web-ui
  workbench-operator: argo-workflows-github-workbench-operator

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "chorus-ci-sa"

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080
  targetPort: 12000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/app-root: /push
  hosts:
    - host: webhook-ci.build.chorus-tre.local
      paths:
        - path: "/"
          pathType: Prefix
  tls:
    - hosts:
        - webhook-ci.build.chorus-tre.local
      secretName: chorus-ci-tls

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
