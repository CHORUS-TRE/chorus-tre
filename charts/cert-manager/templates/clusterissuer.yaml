{{- if .Values.clusterissuer.enabled }}
  {{- fail "clusterissuer.enabled is removed in 0.0.18 — migrate to clusterissuer.http01 / clusterissuer.dns01" }}
{{- end }}
{{- if .Values.clusterissuer.name }}
  {{- fail "clusterissuer.name is removed in 0.0.18 — use clusterissuer.http01.name / clusterissuer.dns01.name" }}
{{- end }}
{{- with .Values.clusterissuer.http01 }}
{{- if .enabled }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ required "clusterissuer.http01.name is required" .name }}
spec:
  acme:
    # The ACME server URL
    server: {{ .server | default "https://acme-v02.api.letsencrypt.org/directory" | quote }}
    # Email address used for ACME registration
    email: {{ .email | default $.Values.clusterissuer.email | quote }}
    # Name of a secret used to store the account's private key
    privateKeySecretRef:
      name: {{ .secret | default .name | quote }}
    solvers:
    # Enable the HTTP-01 challenge provider
    - http01:
        ingress:
          ingressClassName: nginx
{{- end }}
{{- end }}
{{- with .Values.clusterissuer.dns01 }}
{{- if .enabled }}
{{- if not .solver }}
  {{- fail "clusterissuer.dns01.solver must be set when dns01 is enabled" }}
{{- end }}
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ required "clusterissuer.dns01.name is required" .name }}
spec:
  acme:
    # The ACME server URL
    server: {{ .server | default "https://acme-v02.api.letsencrypt.org/directory" | quote }}
    # Email address used for ACME registration
    email: {{ .email | default $.Values.clusterissuer.email | quote }}
    # Name of a secret used to store the account's private key
    privateKeySecretRef:
      name: {{ .secret | default .name | quote }}
    solvers:
    - dns01:
        {{- .solver | toYaml | nindent 8 }}
{{- end }}
{{- end }}
