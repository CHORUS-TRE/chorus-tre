velero:
  # Velero server configuration
  configuration:
    # Enable file-level backup by default (portable, cross-region DR capable)
    # Can be disabled per environment if using volume snapshots only
    defaultVolumesToFsBackup: true

    # Default backup retention (30 days)
    defaultBackupTTL: 720h

    # Backup locations configured per environment
    backupStorageLocation: []

    # Volume snapshots can optionally be enabled per environment for faster backups
    # Requires VolumeSnapshotClass and CSI driver support
    volumeSnapshotLocation: []

    # Log configuration (defaults can be overridden per environment)
    # logLevel: info
    # logFormat: text

    # Feature flags
    features: ""

  priorityClassName: high-priority

  # Credentials managed via Kubernetes secrets per environment
  credentials:
    useSecret: true
    existingSecret: velero-credentials

  # Resource limits for Velero server
  resources:
    requests:
      cpu: 500m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  # Initialize containers for plugins
  initContainers:
    - name: velero-plugin-for-aws
      image: velero/velero-plugin-for-aws:v1.13.2
      imagePullPolicy: IfNotPresent
      volumeMounts:
        - mountPath: /target
          name: plugins

  # Deploy node agent for file-level backups (enabled by default for portability)
  # Can be disabled per environment if using volume snapshots exclusively
  deployNodeAgent: true
  # Node agent configuration (only relevant if deployNodeAgent is true)
  nodeAgent:
    priorityClassName: high-priority
    podVolumePath: /var/lib/kubelet/pods
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

    # Tolerate all taints to ensure backup coverage on all nodes
    tolerations:
      - operator: Exists

  # Monitoring configuration
  metrics:
    serviceMonitor:
      enabled: true

  # Backup schedules are defined per environment based on criticality
  schedules: {}

  # Security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
