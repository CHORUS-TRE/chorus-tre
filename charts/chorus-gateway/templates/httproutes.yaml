{{- /*
  Internal routes — workspace pods only (SecurityPolicy allows podCIDR).
  Optional: matches (path-restricted, e.g. only /openid-connect/ internally).
*/}}
{{- range .Values.internalRoutes }}
{{- $route := . }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "chorus-gateway.internalHTTPRouteName" . }}
  namespace: {{ $.Values.gateway.namespace }}
  labels:
    {{- include "chorus-gateway.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name }}
  hostnames:
    - {{ required "hostname is required" .hostname | quote }}
  rules:
    {{- if .redirectPath }}
    {{- include "chorus-gateway.redirectOnRoot" . | nindent 4 }}
    {{- end }}
    {{- if .matches }}
    {{- range .matches }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ required "pathPrefix is required" .pathPrefix | quote }}
      backendRefs:
        {{- include "chorus-gateway.backendRef" $route | nindent 8 }}
    {{- end }}
    {{- else }}
    - backendRefs:
        {{- include "chorus-gateway.backendRef" . | nindent 8 }}
    {{- end }}
{{- end }}

{{- /*
  External routes — browsers only (SecurityPolicy denies podCIDR).
  Workspace pods get 403.
  Optional: matches (path-restricted, e.g. restrict only /admin to browsers
  while leaving the rest of the hostname on an openRoute).
*/}}
{{- range .Values.externalRoutes }}
{{- $route := . }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "chorus-gateway.externalHTTPRouteName" . }}
  namespace: {{ $.Values.gateway.namespace }}
  labels:
    {{- include "chorus-gateway.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name }}
  hostnames:
    - {{ required "hostname is required" .hostname | quote }}
  rules:
    {{- if .redirectPath }}
    {{- include "chorus-gateway.redirectOnRoot" . | nindent 4 }}
    {{- end }}
    {{- if .matches }}
    {{- range .matches }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ required "pathPrefix is required" .pathPrefix | quote }}
      backendRefs:
        {{- include "chorus-gateway.backendRef" $route | nindent 8 }}
    {{- end }}
    {{- else }}
    - backendRefs:
        {{- include "chorus-gateway.backendRef" . | nindent 8 }}
    {{- end }}
{{- end }}

{{- /*
  ExtAuth callback routes — for external routes with extAuth, create an HTTPRoute
  on /oauth2 path that routes to the oauth2-proxy service for callback handling.
  Targeted by external-securitypolicy (deny podCIDR) so workspace pods can't hit
  the callback, while external browsers complete the OAuth2 flow normally.
  No ExtAuth SecurityPolicy — the callback itself must not require auth.
*/}}
{{- range .Values.externalRoutes }}
{{- if .extAuth }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "chorus-gateway.oauth2HTTPRouteName" . }}
  namespace: {{ $.Values.gateway.namespace }}
  labels:
    {{- include "chorus-gateway.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name }}
  hostnames:
    - {{ .hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
      backendRefs:
        {{- include "chorus-gateway.backendRef" .extAuth | nindent 8 }}
{{- end }}
{{- end }}

{{- /*
  Open routes — accessible from both workspace pods and external browsers.
  No SecurityPolicy restriction.
  Optional: matches (path-restricted, e.g. only /v2 and /service/token open
  while the rest of the hostname is an externalRoute catchall).
*/}}
{{- range .Values.openRoutes }}
{{- $route := . }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "chorus-gateway.openHTTPRouteName" . }}
  namespace: {{ $.Values.gateway.namespace }}
  labels:
    {{- include "chorus-gateway.labels" $ | nindent 4 }}
spec:
  parentRefs:
    - name: {{ $.Values.gateway.name }}
  hostnames:
    - {{ required "hostname is required" .hostname | quote }}
  rules:
    {{- if .redirectPath }}
    {{- include "chorus-gateway.redirectOnRoot" . | nindent 4 }}
    {{- end }}
    {{- if .matches }}
    {{- range .matches }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ required "pathPrefix is required" .pathPrefix | quote }}
      backendRefs:
        {{- include "chorus-gateway.backendRef" $route | nindent 8 }}
    {{- end }}
    {{- else }}
    - backendRefs:
        {{- include "chorus-gateway.backendRef" . | nindent 8 }}
    {{- end }}
{{- end }}
