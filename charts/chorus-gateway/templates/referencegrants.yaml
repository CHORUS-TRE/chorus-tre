{{- /* One ReferenceGrant per unique target namespace */}}
{{- $namespaces := dict }}
{{- range .Values.routes }}
{{- $_ := set $namespaces .namespace . }}
{{- end }}
{{- range $ns, $_ := $namespaces }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: ReferenceGrant
metadata:
  name: chorus-gateway
  namespace: {{ $ns }}
  labels:
    {{- include "chorus-gateway.labels" $ | nindent 4 }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ $.Values.gateway.namespace }}
  to:
    - group: ""
      kind: Service
      # Allows reference to any Service in this namespace.
      # Tighter per-service grants would require one ReferenceGrant per route.
{{- end }}
