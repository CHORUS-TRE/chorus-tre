{{- /*
  Internal SecurityPolicy — allows podCIDR only (workspace pods).
  External clients are rejected (403 for HTTP routes, L4 connection close for TCP routes).
  Targets internal HTTPRoutes and TCPRoutes.
*/}}
{{- if or .Values.internalRoutes .Values.internalTcpRoutes }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: internal-securitypolicy
  namespace: {{ .Values.gateway.namespace }}
  labels:
    {{- include "chorus-gateway.labels" . | nindent 4 }}
spec:
  targetRefs:
    {{- range .Values.internalRoutes }}
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ include "chorus-gateway.internalHTTPRouteName" . }}
    {{- end }}
    {{- range .Values.internalTcpRoutes }}
    - group: gateway.networking.k8s.io
      kind: TCPRoute
      name: {{ include "chorus-gateway.internalTCPRouteName" . }}
    {{- end }}
  authorization:
    defaultAction: Deny
    rules:
      {{- include "chorus-gateway.podCIDRRule" (dict "name" "allow-workspace-pods" "action" "Allow" "podCIDR" .Values.podCIDR) | nindent 6 }}
{{- end }}

{{- /*
  External SecurityPolicy — denies podCIDR (workspace pods get 403).
  External browsers are allowed (defaultAction: Allow).
  Routes with extAuth are excluded — they get their own ExtAuth SecurityPolicy below.
*/}}
{{- if .Values.externalRoutes }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: external-securitypolicy
  namespace: {{ .Values.gateway.namespace }}
  labels:
    {{- include "chorus-gateway.labels" . | nindent 4 }}
spec:
  targetRefs:
    {{- range .Values.externalRoutes }}
    {{- if and (not .extAuth) (not .oidc) }}
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ include "chorus-gateway.externalHTTPRouteName" . }}
    {{- end }}
    {{- /* OAuth2 callback routes for extAuth routes — deny podCIDR */}}
    {{- if .extAuth }}
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ include "chorus-gateway.oauth2HTTPRouteName" . }}
    {{- end }}
    {{- end }}
  authorization:
    defaultAction: Allow
    rules:
      {{- include "chorus-gateway.podCIDRRule" (dict "name" "deny-workspace-pods" "action" "Deny" "podCIDR" .Values.podCIDR) | nindent 6 }}
{{- end }}

{{- /*
  ExtAuth SecurityPolicies — one per external route that has extAuth configured.
  Uses Envoy external authorization to forward auth checks to an oauth2-proxy service.
  Also denies podCIDR (workspace pods) via authorization rules.
*/}}
{{- range .Values.externalRoutes }}
{{- if .extAuth }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ include "chorus-gateway.extAuthSecurityPolicyName" . }}
  namespace: {{ $.Values.gateway.namespace }}
  labels:
    {{- include "chorus-gateway.labels" $ | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: {{ include "chorus-gateway.externalHTTPRouteName" . }}
  authorization:
    defaultAction: Allow
    rules:
      {{- include "chorus-gateway.podCIDRRule" (dict "name" "deny-workspace-pods" "action" "Deny" "podCIDR" $.Values.podCIDR) | nindent 6 }}
  extAuth:
    failOpen: false
    headersToExtAuth:
      - Cookie
      - Authorization
      - Accept
      - X-Forwarded-Proto
      - X-Forwarded-Host
      - X-Forwarded-Uri
      - X-Auth-Request-Redirect
    http:
      backendRefs:
        - group: ""
          kind: Service
          name: {{ required "extAuth.serviceName is required" .extAuth.serviceName }}
          namespace: {{ required "extAuth.namespace is required" .extAuth.namespace }}
          port: {{ required "extAuth.servicePort is required" .extAuth.servicePort }}
      path: {{ .extAuth.path | default "/oauth2/auth" }}
      headersToBackend:
        - X-Auth-Request-User
        - X-Auth-Request-Email
        - X-Auth-Request-Groups
        - X-Auth-Request-Access-Token
{{- end }}
{{- end }}

{{- /* Open routes have no SecurityPolicy — accessible from everyone. */}}
