# Cluster pod CIDR — used in SecurityPolicy to control per-route access.
# Internal routes: Allow podCIDR only (workspace pods). External routes: Deny podCIDR (browsers only).
# With externalTrafficPolicy: Local, SecurityPolicy clientCIDRs sees real source IPs.
# Must be set in environment values.
# To find it: kubectl get nodes -o jsonpath='{.items[*].spec.podCIDR}'
# Each node shows its /24 subnet (e.g. 192.168.0.0/24, 192.168.1.0/24).
# Derive the cluster supernet by keeping the first two octets and using /16 (e.g. 192.168.0.0/16).
podCIDR: ""

# Gateway reference. `name` must match `gateway.name` in the gateway-helm chart
# (routes attach to that Gateway by name). Rename in both charts.
gateway:
  name: chorus-gateway
  namespace: envoy-gateway-system

# Internal routes — accessible from workspace pods only (SecurityPolicy allows podCIDR).
# External browsers get 403.
# Each entry creates an HTTPRoute and ReferenceGrant.
# Must be set in environment values.
#
# Optional: matches (path-restricted route, e.g. expose only /openid-connect/ internally).
# Optional: timeouts (Gateway API HTTPRoute timeouts; see openRoutes for an example).
# Optional: extraAllowedCIDRs (list of source CIDRs allowed on this route in
#   addition to the cluster podCIDR). When set, the route is pulled out of the
#   shared internal-securitypolicy and given its own dedicated SecurityPolicy
#   (defaultAction: Deny + Allow rule whose clientCIDRs = [podCIDR] +
#   extraAllowedCIDRs). Use this for an internal endpoint that also needs to be
#   reachable from a fixed set of off-cluster source IPs without exposing every
#   other internal route to those IPs.
#
#   Use with caution — each entry widens the allowlist on this route:
#
#   - Source IP is the only barrier. The route's own authn/authz must be
#     sufficient for any caller in the allowlist; the SecurityPolicy does not
#     authenticate anyone.
#   - Keep CIDRs as narrow as possible (prefer /32). A /24 is rarely justified.
#   - Requires externalTrafficPolicy: Local on the Gateway so Envoy sees the
#     real client IP. With Cluster, the LB SNATs to a node IP and the check is
#     meaningless.
#   - Never apply to a route serving an admin UI, an interactive login page, or
#     anything not designed for a non-workspace caller. Split such surfaces
#     into a separate internalRoute with a path match (matches:) and allowlist
#     only the safe paths.
#   - Source IPs drift; review periodically and remove stale entries.
#
# Example:
#   internalRoutes:
#     - name: gitlab
#       hostname: gitlab.chorus-tre.local
#       namespace: gitlab
#       serviceName: gitlab-webservice-default
#       servicePort: 8181
#     - name: i2b2
#       hostname: i2b2.chorus-tre.local
#       namespace: i2b2
#       serviceName: i2b2-frontend
#       servicePort: 80
#       redirectPath: /webclient
#     - name: backend-idp
#       hostname: backend.chorus-tre.local
#       namespace: backend
#       serviceName: backend
#       servicePort: 5000
#       matches:
#         - pathPrefix: /openid-connect
#       # Allowed on top of the cluster podCIDR. The values below are the
#       # RFC 5737 TEST-NET-3 documentation range — replace with real source
#       # CIDRs in environment values.
#       extraAllowedCIDRs:
#         - 198.51.100.10/32
#         - 198.51.100.11/32
internalRoutes: []

# HTML body returned when an internal route denies an external client (SecurityPolicy 403).
# Replaces the default "RBAC: access denied" text with a user-friendly page via a
# BackendTrafficPolicy + responseOverride on each internal HTTPRoute.
# Set to "" to disable the override and keep Envoy's default response body.
internalAccessDeniedHTML: |-
  <!doctype html>
  <html>
    <head>
      <meta charset="utf-8">
      <title>Access denied</title>
      <style>
        body { font-family: system-ui, sans-serif; margin: 4rem auto; max-width: 40rem; color: #333; }
        h1 { color: #222; }
        p { line-height: 1.5; }
      </style>
    </head>
    <body>
      <h1>Access denied</h1>
      <p>This service is only reachable from inside a CHORUS workspace.</p>
      <p>Please open it from within your workspace.</p>
    </body>
  </html>

# External routes — accessible from external browsers only (SecurityPolicy denies podCIDR).
# Workspace pods get 403.
# Each entry creates an HTTPRoute and ReferenceGrant.
# Must be set in environment values.
#
# Optional: matches (path-restricted, e.g. restrict only /admin on a hostname
# that is otherwise served by an openRoute catch-all).
# Optional: timeouts (Gateway API HTTPRoute timeouts; see openRoutes for an example).
#
# Example:
#   externalRoutes:
#     # Full backend API — browsers only. Combine with the backend-idp internalRoute above
#     # to gate /openid-connect/ to workspace pods while keeping the rest browser-only.
#     # Same hostname, different paths, different SecurityPolicies — Gateway API evaluates
#     # the more specific pathPrefix first.
#     - name: backend
#       hostname: backend.chorus-tre.local
#       namespace: backend
#       serviceName: backend
#       servicePort: 5000
#     # Routes for services without built-in auth must use extAuth (see below) —
#     # exposing them with just SecurityPolicy denies workspace pods but leaves
#     # them open to any external browser.
#     # Routes with extAuth get an ExtAuth SecurityPolicy + a /oauth2 callback route.
#     # The oauth2-proxy handles authentication via Keycloak OIDC.
#     - name: prometheus
#       hostname: prometheus.chorus-tre.local
#       namespace: prometheus
#       serviceName: prometheus
#       servicePort: 9090
#       extAuth:
#         serviceName: prometheus-oauth2-proxy
#         namespace: prometheus
#         servicePort: 80
#     # Restrict only /admin on a hostname otherwise served by an openRoute catchall.
#     - name: auth-admin
#       hostname: auth.chorus-tre.local
#       namespace: keycloak
#       serviceName: keycloak
#       servicePort: 80
#       matches:
#         - pathPrefix: /admin
#     # Route protected by native Envoy Gateway OIDC.
#     # clientSecretName must reference a Secret in the gateway namespace with a
#     # `client-secret` key. Redirect URL path is intercepted by Envoy and handled
#     # internally; the upstream service never sees unauthenticated traffic.
#     # authorizationEndpoint and tokenEndpoint are optional — Envoy Gateway
#     # discovers them from the issuer's /.well-known/openid-configuration by
#     # default. Set them explicitly only to override that discovery.
#     # Set `enabled: false` to temporarily turn off OIDC without deleting the block.
#     #
#     # Defense-in-depth: native OIDC enforces auth only at the gateway. Without
#     # a NetworkPolicy on the upstream, any cluster pod can reach its ClusterIP
#     # directly and bypass OIDC. juicefs-csi-driver and kube-prometheus-stack
#     # wrappers ship one — mirror that pattern for new OIDC routes.
#     - name: juicefs-dashboard
#       hostname: juicefs-dashboard.chorus-tre.local
#       namespace: kube-system
#       serviceName: juicefs-csi-dashboard
#       servicePort: 8088
#       oidc:
#         provider:
#           serviceName: keycloak
#           namespace: keycloak
#           servicePort: 80
#         issuer: https://auth.chorus-tre.local/realms/infra
#         clientID: juicefs-dashboard
#         clientSecretName: juicefs-dashboard-oidc-secret
#         redirectURL: https://juicefs-dashboard.chorus-tre.local/oauth2/callback
#         logoutPath: /oauth2/logout
#         scopes: [openid, email]
externalRoutes: []

# Open routes — accessible from both workspace pods and external browsers.
# No SecurityPolicy restriction.
# Each entry creates an HTTPRoute and ReferenceGrant.
# Must be set in environment values.
#
# Optional: matches (path-restricted, e.g. only /v2 and /service/token open
# on a hostname that is otherwise served by an externalRoute catchall).
# Optional: timeouts — Gateway API HTTPRoute timeouts. Both `request` and
# `backendRequest` accept Go duration strings (e.g. "30s", "5m") or "0s" to
# disable the wall-clock kill. When disabled, envoy's per-stream idle timeout
# (default 5m, resets per byte) still protects against stalled streams. Use
# this for endpoints that legitimately stream large bodies, e.g. a container
# registry serving multi-GB image layers.
#
# Example:
#   openRoutes:
#     - name: auth
#       hostname: auth.chorus-tre.local
#       namespace: keycloak
#       serviceName: keycloak
#       servicePort: 80
#     # Expose only /v2 and /service/token on a hostname otherwise served by
#     # an externalRoute catchall (so pods can pull images, browsers get the UI).
#     # timeouts.request "0s" disables the envoy 15s default so multi-GB image
#     # layers can stream end-to-end; per-stream idle timeout still protects.
#     - name: harbor-registry
#       hostname: harbor.chorus-tre.local
#       namespace: harbor
#       serviceName: harbor
#       servicePort: 80
#       matches:
#         - pathPrefix: /v2
#         - pathPrefix: /service/token
#       timeouts:
#         request: "0s"
#         backendRequest: "0s"
#     # OIDC on an openRoute — for Build cluster, where CHORUS isn't deployed.
#     # Envoy Gateway runs the full Keycloak login flow before any request reaches
#     # prometheus. No podCIDR rule is emitted (no workspaces to isolate).
#     - name: prometheus
#       hostname: prometheus.build.chorus-tre.local
#       namespace: prometheus
#       serviceName: chorus-build-kube-promethe-prometheus
#       servicePort: 9090
#       oidc:
#         provider:
#           serviceName: chorus-build-keycloak
#           namespace: keycloak
#           servicePort: 80
#         issuer: https://auth.build.chorus-tre.local/realms/infra
#         authorizationEndpoint: https://auth.build.chorus-tre.local/realms/infra/protocol/openid-connect/auth
#         tokenEndpoint: https://auth.build.chorus-tre.local/realms/infra/protocol/openid-connect/token
#         clientID: prometheus
#         clientSecretName: prometheus-oidc-secret
#         redirectURL: https://prometheus.build.chorus-tre.local/oauth2/callback
#         logoutPath: /oauth2/logout
#         scopes: [openid, email]
openRoutes: []

# Internal TCP routes — workspace pods only (SecurityPolicy allows podCIDR).
# Each entry creates a TCPRoute forwarding gatewayPort to the service.
# SecurityPolicy with clientCIDRs restricts access to podCIDR (same as internalRoutes).
# gatewayPort must match a tcpListeners entry in the gateway-helm chart
# (Envoy Gateway remaps it to gatewayPort+10000 internally, e.g. 22 → 10022).
#
# Example:
#   internalTcpRoutes:
#     - name: gitlab-shell
#       namespace: gitlab
#       serviceName: gitlab-shell
#       servicePort: 22
#       gatewayPort: 22
internalTcpRoutes: []

# Open gRPC routes — accessible from anywhere, no SecurityPolicy restriction.
# Each entry creates a GRPCRoute and ReferenceGrant. Backend Service must speak
# gRPC over HTTP/2 (e.g. argo-cd-server, gRPC microservices). Envoy Gateway uses
# HTTP/2 to the upstream automatically when the route is a GRPCRoute, so an
# `appProtocol` on the Service port is not required.
#
# Example — argo-cd's gRPC API on a dedicated hostname (Build cluster, where CHORUS isn't deployed):
#   openGrpcRoutes:
#     - name: argo-cd-grpc
#       hostname: grpc.argo-cd.build.chorus-tre.local
#       namespace: argocd
#       serviceName: chorus-build-argo-cd-argocd-server
#       servicePort: 443
openGrpcRoutes: []

# Internal shell services — each entry creates a CiliumNetworkPolicy restricting ingress on the
# service container port to Envoy pods only (defense-in-depth for internal TCP services).
# Envoy terminates the client TCP connection and opens a new one to the service pod,
# so the source IP at the service pod is the Envoy pod IP, not the original client IP.
# gatewayPort must match a tcpListeners entry in gateway-helm (Envoy remaps it to gatewayPort+10000).
#
# Example:
#   internalShellServices:
#     - name: gitlab-shell
#       namespace: gitlab
#       podSelector:
#         app: gitlab-shell
#       containerPort: 2222
#       gatewayPort: 22
internalShellServices: []
