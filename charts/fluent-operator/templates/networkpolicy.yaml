{{- if and (.Values.networkPolicy.enabled) (eq .Values.networkPolicy.flavor "kubernetes") }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fluent-operator-namespace-only
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "networkPolicy.labels" . | nindent 4 }}
spec:
  policyTypes:
    - Ingress
    - Egress
  podSelector:
    matchLabels:
      app.kubernetes.io/name: fluent-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
  egress:
    - to:
        - podSelector: {}
  ingress:
    - from:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fluent-operator-egress-dns
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "networkPolicy.labels" . | nindent 4 }}
spec:
  policyTypes:
    - Egress
  podSelector:
    matchLabels:
      app.kubernetes.io/name: fluent-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fluent-operator-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "networkPolicy.labels" . | nindent 4 }}
spec:
  policyTypes:
    - Egress
  podSelector:
    matchLabels:
      app.kubernetes.io/name: fluent-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: fluent-bit
  egress:
    - ports:
        - port: {{ .Values.networkPolicy.loki.port | default 80 }}
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.loki.namespace | default "loki" }}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: loki
              app.kubernetes.io/component: gateway
{{- end }}
