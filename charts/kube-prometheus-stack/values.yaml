kube-prometheus-stack:
  # CRDs should be installed beforehand such that Alertmanager can be configured with it
  crds:
    enabled: false

  alertmanager:
    ingress:
      enabled: false # What is below acts as documentation
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      hosts:
        - alertmanager.build.chorus-tre.local
      tls:
        - secretName: alertmanager-general-tls
          hosts:
            - alertmanager.build.chorus-tre.local

    # Defense-in-depth: auth is enforced only at the gateway (Envoy OIDC). Without
    # this NetworkPolicy any cluster pod could reach :9093 directly and bypass it.
    # Assumes replicas: 1 (no cluster mesh on port 9094).
    networkPolicy:
      enabled: true
      policyTypes:
        - Ingress
      gateway:
        namespace: envoy-gateway-system
        podLabels:
          app.kubernetes.io/managed-by: envoy-gateway
      monitoringRules:
        prometheus: true  # Prometheus pushes alerts here.
      # Allow Prometheus to scrape the config-reloader sidecar metrics on port
      # 8080 (the alertmanager Service exposes both 9093 and 8080, and the
      # chart's monitoringRules.prometheus rule only covers 9093).
      additionalIngress:
        - from:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/name: prometheus
          ports:
            - port: 8080
              protocol: TCP

    alertmanagerSpec:
      priorityClassName: high-priority
      logFormat: json
      retention: 20h

      alertmanagerConfiguration:
        # This must match the name in the alertmanagerConfiguration.name at the bottom.
        name: global-alertmanager-config

      alertmanagerConfigSelector:
        matchLabels:
          alertmanagerConfig: enabled
      alertmanagerConfigMatcherStrategy:
        # default is OnNamespace
        # which means we cannot have a catchall to webex.
        type: null

      storage:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 256Mi

  grafana:
    enabled: true

    admin:
      existingSecret: "grafana-secret"
      #userKey: admin-user
      #passwordKey: admin-password

    ingress:
      enabled: false # What is below acts as documentation
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      hosts:
        - grafana.build.chorus-tre.local
      tls:
        - secretName: grafana-general-tls
          hosts:
            - grafana.build.chorus-tre.local

    persistence:
      enabled: true

      size: 1Gi

    grafana.ini:
      # https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/#analytics
      analytics:
        check_for_updates: false
        check_for_plugin_updates: false
        feedback_links_enabled: false
      # https://grafana.com/docs/grafana/latest/administration/configuration/#server
      server:
        enable_gzip: true
        domain: grafana.build.chorus-tre.local
        root_url: https://grafana.build.chorus-tre.local/

    env:
      # Replace with the actual URL of your Loki gateway, e.g. http://chorus-build-loki-gateway:80
      LOKI_URL: ""

    envValueFrom:
      LOKI_USER:
        secretKeyRef:
          name: loki-client-credentials
          key: httpUser
      LOKI_PASSWORD:
        secretKeyRef:
          name: loki-client-credentials
          key: httpPassword
      LOKI_TENANT_ID:
        secretKeyRef:
          name: loki-client-credentials
          key: tenantID

    additionalDataSources:
      - name: Loki
        type: loki
        uid: loki
        url: $LOKI_URL
        access: proxy
        editable: false
        basicAuth: true
        basicAuthUser: $LOKI_USER
        jsonData:
          httpHeaderName1: X-Scope-OrgID
        secureJsonData:
          httpHeaderValue1: $LOKI_TENANT_ID
          basicAuthPassword: $LOKI_PASSWORD

  prometheus:
    ingress:
      enabled: false # What is below acts as documentation
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
      hosts:
        - prometheus.build.chorus-tre.local
      tls:
        - secretName: prometheus-general-tls
          hosts:
            - prometheus.build.chorus-tre.local

    # Defense-in-depth: auth is enforced only at the gateway (Envoy OIDC). Without
    # this NetworkPolicy any cluster pod could reach :9090 directly and bypass it.
    # Egress is explicit because the upstream template hardcodes
    # policyTypes: [Egress, Ingress] — Prometheus scrapes targets cluster-wide.
    networkPolicy:
      enabled: true
      flavor: kubernetes
      egress:
        - {}  # Allow all egress (scrape targets are anywhere in the cluster).
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  kubernetes.io/metadata.name: envoy-gateway-system
              podSelector:
                matchLabels:
                  app.kubernetes.io/managed-by: envoy-gateway
          ports:
            - port: 9090
              protocol: TCP
        - from:
            - podSelector: {}  # Same-namespace pods (Grafana queries, Prometheus self-scrape).
          ports:
            - port: 9090
              protocol: TCP

    prometheusSpec:
      priorityClassName: high-priority
      logFormat: json
      retention: 3d

      # All pods, probes and service monitors will be used.
      podMonitorSelectorNilUsesHelmValues: false
      probeSelectorNilUsesHelmValues: false
      ruleSelectorNilUsesHelmValues: false
      serviceMonitorSelectorNilUsesHelmValues: false

      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi

  prometheusOperator:
    admissionWebhooks:
      patch:
        priorityClassName: low-priority

  kubelet:
    serviceMonitor:
      cAdvisorMetricRelabelings:
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_cpu_(load_average_10s|system_seconds_total|user_seconds_total)'
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)'
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_memory_(mapped_file|swap)'
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_(file_descriptors|tasks_state|threads_max)'
        - sourceLabels: [__name__, scope]
          action: drop
          regex: 'container_memory_failures_total;hierarchy'
        - sourceLabels: [__name__, interface]
          action: drop
          regex: 'container_network_.*;(cali|cilium|cni|lxc|nodelocaldns|tunl).*'
        - sourceLabels: [__name__]
          action: drop
          regex: 'container_spec.*'
        - sourceLabels: [id, pod]
          action: drop
          regex: '.+;'

alertmanagerConfiguration:
  name: global-alertmanager-config

  webex:
    enabled: true

    name: webex
    severity: critical # E.g. "warning|critical"

    credentials:
      # The name of the secret and the key containing the access token
      name: config-webex-secret
      key: accessToken

    roomID: ""
