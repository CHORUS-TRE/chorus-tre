{{- /*
  Render a CiliumNetworkPolicy only when L7 inspection is requested AND at
  least one L7 rule is provided. The K8s NetworkPolicy in networkpolicy.yaml
  is the L3/L4 baseline; this CNP layers HTTP/DNS L7 rules on top for
  Cilium-backed clusters.
*/ -}}
{{- if and .Values.networkPolicy.enabled .Values.networkPolicy.enabledL7Waf -}}
{{- $l7 := .Values.networkPolicy.l7 | default dict -}}
{{- if or $l7.ingress $l7.egress }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "i2b2-frontend.fullname" . }}-l7
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "i2b2-frontend.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "i2b2-frontend.selectorLabels" . | nindent 6 }}
  {{- with $l7.ingress }}
  ingress:
    {{- toYaml . | nindent 2 }}
  {{- end }}
  {{- with $l7.egress }}
  egress:
    {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
{{- end }}
