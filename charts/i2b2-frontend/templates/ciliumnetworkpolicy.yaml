{{- /*
  Render a CiliumNetworkPolicy when either (a) L7 inspection is requested and at
  least one L7 rule is provided, or (b) nodeLocalDns is enabled. The K8s
  NetworkPolicy in networkpolicy.yaml is the L3/L4 baseline; this CNP layers
  L7 rules on top for ports not already opened there (see the L4/L7-shadowing
  note in values.yaml), and adds a Cilium-only port-53 egress to the
  node-local-dns link-local IP when nodeLocalDns is true (K8s NP cannot match
  hostNetwork pods). Cilium-backed clusters only.
*/ -}}
{{- $l7 := .Values.networkPolicy.l7 | default dict -}}
{{- $l7Active := and .Values.networkPolicy.enabledL7 (or $l7.ingress $l7.egress) -}}
{{- $nld := .Values.networkPolicy.nodeLocalDns -}}
{{- if and .Values.networkPolicy.enabled (or $l7Active $nld) }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "i2b2-frontend.fullname" . }}-l7
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "i2b2-frontend.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      {{- include "i2b2-frontend.selectorLabels" . | nindent 6 }}
  {{- with $l7.ingress }}
  ingress:
    {{- toYaml . | nindent 2 }}
  {{- end }}
  {{- if or $nld $l7.egress }}
  egress:
  {{- if $nld }}
  - toCIDR:
    - "169.254.20.10/32"
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  {{- end }}
  {{- with $l7.egress }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
  {{- end }}
{{- end }}
