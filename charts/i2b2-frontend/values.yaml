# Default values for i2b2.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
replicaCount: 1

image:
  repository: docker.io/i2b2/i2b2-web
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "release-v1.8.1a.0001"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

priorityClassName: low-priority
podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: i2b2.chorus-tre.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: i2b2-tls
      hosts:
        - i2b2.chorus-tre.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage:

volumes:
  - name: i2b2-config
    configMap:
      name: chorus-i2b2-frontend-configmap

volumeMounts:
  - name: i2b2-config
    mountPath: "/var/www/html/webclient/i2b2_config_domains.json"
    subPath: i2b2_config_domains.json
    readOnly: false
  - name: i2b2-config
    mountPath: "/var/www/html/webclient/proxy.php"
    subPath: proxy.php
    readOnly: false
  - name: i2b2-config
    mountPath: "/var/www/html/webclient/i2b2_proxy.conf"
    subPath: i2b2_proxy.conf
    readOnly: false

nodeSelector: {}

tolerations: []

affinity: {}

# livenessProbe:
#   httpGet:
#     path: /
#     port: http

# readinessProbe:
#   httpGet:
#     path: /
#     port: http

command: "/run-httpd.sh localhost"

cm:
  urlCellPM: "http://chorus-env-i2b2-wildfly:8080/i2b2/services/PMService/"
  pmURL: "http://chorus-env-i2b2-wildfly:8080/i2b2/rest/PMService/getServices"
  whiteListURL: "http://chorus-env-i2b2-wildfly:8080"
  ProxyPass: "http://chorus-env-i2b2-wildfly:8080/i2b2/"

networkPolicy:
  enabled: true
  # -----------------------------------------------------------------------------
  # Two-layer model:
  #   * networkPolicy.ingress / networkPolicy.egress (below) define L3/L4 rules
  #     in standard K8s NetworkPolicy syntax. They are ALWAYS rendered when
  #     networkPolicy.enabled is true, and they work on any CNI that implements
  #     the K8s NetworkPolicy API (Cilium, Calico, vanilla kube-network, ...).
  #   * networkPolicy.l7.ingress / networkPolicy.l7.egress (further below) hold
  #     L7 (HTTP / DNS) rules in CiliumNetworkPolicy syntax. They are ONLY
  #     consulted on Cilium clusters and only when enabledL7 is true.
  #
  # enabledL7 is an explicit opt-in switch for the L7 layer. It does NOT
  # by itself produce any L7 filtering — the CiliumNetworkPolicy is rendered
  # only when BOTH conditions hold:
  #     enabledL7 == true   AND   at least one of l7.ingress / l7.egress
  #                                  contains rules.
  # Flipping enabledL7 to true while leaving l7.{ingress,egress} empty is a
  # no-op: only the K8s NetworkPolicy below will exist, giving L3/L4 enforcement
  # but NO HTTP-path / method / DNS filtering.
  # -----------------------------------------------------------------------------
  enabledL7: false
  # ---- L3/L4 baseline (K8s NetworkPolicy, networking.k8s.io/v1) ----------------
  # Standard K8s syntax: `from` / `to` / `ports`. Always rendered.
  # Set `ingress: []` to lock the pod down with a default-deny (no traffic in).
  ingress:
  # Allow ingress only from Envoy Gateway. Frontend exposure is expected
  # to be handled through chorus-gateway rather than a chart-local Ingress.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: envoy-gateway-system
      podSelector:
        matchLabels:
          app.kubernetes.io/managed-by: envoy-gateway
    ports:
    - protocol: TCP
      port: 80
  egress:
  # Allow egress to i2b2-wildfly. Assumes i2b2-frontend and i2b2-wildfly are
  # co-located in the same namespace (the case for every chorus-tre env today);
  # if they ever split, add a `namespaceSelector` here or wildfly is silently
  # denied.
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: i2b2-wildfly
    ports:
    - protocol: TCP
      port: 8080
  # L7 HTTP rules in CiliumNetworkPolicy syntax (toPorts + rules.http / rules.dns).
  # Only consulted when enabledL7 is true. Leave empty to skip the CNP entirely.
  #
  # IMPORTANT — Cilium L4/L7 shadowing: if a port is opened unconditionally in
  # the K8s NetworkPolicy above (networkPolicy.ingress/egress), the broader
  # L4 grant wins and any L7 rule you add here for that same port is silently
  # NOT enforced. To get L7 filtering on a port, that port must NOT also be
  # opened in the K8s NP for the same direction — let the CNP own it.
  l7:
    ingress: []
    egress: []
