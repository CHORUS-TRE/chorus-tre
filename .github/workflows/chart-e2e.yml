name: Chart E2E Tests

on:
  pull_request:
    branches:
      - master
    paths:
      - 'charts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  chart-e2e:
    # Skip draft PRs
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    # ── Checkout ────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v5.0.0
      with:
        fetch-depth: 0

    # ── Detect modified charts ──────────────────────────────────
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v46.0.5

    - name: Identify modified charts
      id: modified_charts
      run: |
        MODIFIED_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ',' '\n')
        MODIFIED_CHARTS=$(echo "$MODIFIED_FILES" | grep -o 'charts/[^/]*' | sort -u || true)

        if [ -z "$MODIFIED_CHARTS" ]; then
          echo "No modified charts found."
          echo "charts=" >> "$GITHUB_OUTPUT"
        else
          echo "Modified charts: $MODIFIED_CHARTS"
          # Store as space-separated list
          echo "charts=$(echo $MODIFIED_CHARTS | tr '\n' ' ')" >> "$GITHUB_OUTPUT"
        fi

    # ── Install tools ───────────────────────────────────────────
    - name: Set up Helm
      if: steps.modified_charts.outputs.charts != ''
      uses: azure/setup-helm@v4.3.1
      with:
        version: 'latest'

    - name: Install yq
      if: steps.modified_charts.outputs.charts != ''
      uses: mikefarah/yq@v4.44.6

    - name: Install Cilium CLI
      if: steps.modified_charts.outputs.charts != ''
      run: |
        CILIUM_CLI_VERSION="v0.16.22"
        ARCH=$(dpkg --print-architecture)
        curl -fsSL "https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-${ARCH}.tar.gz" | sudo tar xz -C /usr/local/bin
        cilium version --client

    # ── Create Kind cluster with Cilium ─────────────────────────
    - name: Create Kind cluster
      if: steps.modified_charts.outputs.charts != ''
      uses: helm/kind-action@v1.12.0
      with:
        config: ci/kind-config.yaml
        cluster_name: chart-e2e
        wait: 60s

    - name: Install Cilium CNI
      if: steps.modified_charts.outputs.charts != ''
      run: |
        cilium install --version 1.16.5 --wait
        cilium status --wait

        # Restart CoreDNS to pick up Cilium CNI
        kubectl -n kube-system rollout restart deployment/coredns
        kubectl -n kube-system rollout status deployment/coredns --timeout=60s

        # Verify nodes are Ready
        kubectl wait --for=condition=Ready nodes --all --timeout=120s

        echo "Cluster ready:"
        kubectl get nodes -o wide
        kubectl get pods -A

    # ── Add Helm repos for dependencies ─────────────────────────
    - name: Add Helm repositories
      if: steps.modified_charts.outputs.charts != ''
      run: |
        for chart_path in ${{ steps.modified_charts.outputs.charts }}; do
          if [ -f "${chart_path}/Chart.yaml" ]; then
            REPOS=$(grep 'repository:' "${chart_path}/Chart.yaml" | awk '{print $2}' | sort -u || true)
            if [ -n "$REPOS" ]; then
              for repo in $REPOS; do
                if [[ "$repo" == oci://* ]]; then
                  echo "Skipping OCI repo: $repo"
                  continue
                fi
                repo_name=$(echo "$repo" | sed -E 's|^https?://||;s|/|-|g')
                helm repo add "$repo_name" "$repo" 2>/dev/null || true
              done
            fi
          fi
        done
        helm repo update 2>/dev/null || true

    # ── Run e2e tests per chart ─────────────────────────────────
    - name: Run chart e2e tests
      if: steps.modified_charts.outputs.charts != ''
      run: |
        OVERALL_EXIT=0

        for chart_path in ${{ steps.modified_charts.outputs.charts }}; do
          chart_name=$(basename "$chart_path")
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║  Testing: ${chart_name}"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""

          if ! ./ci/run-chart-e2e.sh "$chart_path" "$chart_name"; then
            echo "::error::E2E tests failed for chart: ${chart_name}"
            OVERALL_EXIT=1
          fi

          # Clean up between charts: uninstall release and delete test pods
          helm uninstall "e2e-${chart_name}" -n "$(yq ".charts.\"${chart_name}\".namespace // .defaults.namespace // \"test\"" ci/chart-tests.yaml)" 2>/dev/null || true
          kubectl delete pods --field-selector=status.phase!=Running -A 2>/dev/null || true
          echo ""
        done

        exit $OVERALL_EXIT

    # ── Upload debug info on failure ────────────────────────────
    - name: Collect debug info on failure
      if: failure() && steps.modified_charts.outputs.charts != ''
      run: |
        echo "=== Node status ==="
        kubectl get nodes -o wide
        echo ""
        echo "=== All pods ==="
        kubectl get pods -A -o wide
        echo ""
        echo "=== Network policies ==="
        kubectl get networkpolicy -A 2>/dev/null || true
        kubectl get ciliumnetworkpolicy -A 2>/dev/null || true
        echo ""
        echo "=== Events ==="
        kubectl get events -A --sort-by=.lastTimestamp | tail -50
        echo ""
        echo "=== Cilium status ==="
        cilium status 2>/dev/null || true
