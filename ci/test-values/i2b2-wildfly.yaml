# ci/test-values/i2b2-wildfly.yaml
# CI-specific values for testing i2b2-wildfly in Kind
#
# Default values.yaml uses enabled_l7_waf: false with K8s-format NetworkPolicy rules.
# This file overrides settings that don't work in Kind (priorityClass, image, probes).

# Use nginx listening on 8080 to match the service/netpol port expectations
# The containerPort is set via service.http, and nginx default is 80,
# so we use the nginxinc/nginx-unprivileged image which can be configured via env
image:
  repository: nginxinc/nginx-unprivileged
  tag: "alpine"

# PriorityClass "low-priority" doesn't exist in Kind
priorityClassName: ""

# Network policy — keep K8s format (enabled_l7_waf: false is the default)
networkPolicy:
  enabled: true
  enabled_l7_waf: false
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
              app.kubernetes.io/component: controller
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: i2b2-frontend
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: i2b2-postgres
      ports:
        - protocol: TCP
          port: 5432

# Disable K8s ingress (no ingress controller in Kind)
ingress:
  enabled: false

# Keep service.http at 8080 (matching netpol rules).
# nginxinc/nginx-unprivileged listens on 8080 by default — perfect match.
service:
  type: ClusterIP
  http: 8080
  api: 9990

# Null out probes — nginx doesn't have the wildfly health endpoint
livenessProbe: null
readinessProbe: null

# Override env vars to use plain strings instead of secret references.
# The default values.yaml uses existingSecret refs to "i2b2-wildfly-secret"
# which won't exist in the CI cluster. Since we use nginx-unprivileged
# as the image, these env vars are irrelevant — just need valid K8s spec.
env:
  PG_PASS: "ci-dummy"
  DS_TYPE: "postgres"
  DS_PASSWORD: "ci-dummy"
  DS_WD_USER: "i2b2workdata"
  DS_WD_PASS: "ci-dummy"
  DS_WD_IP: "i2b2-pg"
  DS_WD_PORT: "5432"
  DS_WD_DB: "i2b2"
  DS_WD_SCHEMA: "i2b2workdata"
  DS_CRC_IP: "i2b2-pg"
  DS_CRC_USER: "i2b2"
  DS_CRC_PASS: "ci-dummy"
  DS_CRC_PORT: "5432"
  DS_CRC_DB: "i2b2"
  DS_CRC_SCHEMA: "i2b2demodata"
  DS_CRC_DB_TYPE: "pg"
  DS_ONT_IP: "i2b2-pg"
  DS_ONT_USER: "i2b2"
  DS_ONT_PASS: "ci-dummy"
  DS_ONT_PORT: "5432"
  DS_ONT_DB: "i2b2"
  DS_ONT_SCHEMA: "i2b2metadata"
  DS_ONT_DB_TYPE: "pg"
  DS_PM_DB: "i2b2"
  DS_PM_SCHEMA: "i2b2pm"
  DS_PM_PORT: "5432"
  DS_PM_IP: "i2b2-pg"
  DS_PM_USER: "i2b2"
  DS_PM_PASS: "ci-dummy"
  DS_PM_DB_TYPE: "pg"
  DS_HIVE_IP: "i2b2-pg"
  DS_HIVE_USER: "i2b2"
  DS_HIVE_PASS: "ci-dummy"
  DS_HIVE_PORT: "5432"
  DS_HIVE_DB: "i2b2"
  DS_HIVE_SCHEMA: "i2b2hive"
  DS_HIVE_DB_TYPE: "pg"
  DS_CSV_DELIMITER: ","
  DS_BCP_DELIMITER: "^"
