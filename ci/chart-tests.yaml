# ci/chart-tests.yaml — Central test registry for chart e2e testing
#
# Defines per-chart test parameters for the e2e pipeline.
# Charts not listed here get a default smoke test (deploy + readiness check).
#
# Structure:
#   defaults:              Global defaults applied to all charts
#   charts.<name>:         Per-chart configuration
#     namespace:           K8s namespace (default: "test")
#     timeout:             Seconds to wait for pods Ready (default: 120)
#     values:              Inline --set overrides (key: value)
#     values_file:         Path to a CI-specific values file (relative to repo root)
#     skip_deploy:         If true, skip helm install (e.g., CRD-only charts)
#     depends_on:          List of chart names that must be deployed first
#                          Dependencies are deployed (not tested) before this chart.
#                          They remain running so the chart under test can connect.
#     services:            List of services to smoke-test after deployment
#       - port:            Port to check
#     ingress:             Ingress connectivity tests
#       allowed:           List of {labels, port} — should succeed
#       denied:            List of {labels, port} — should timeout/fail
#     egress:              Egress connectivity tests
#       allowed:           List of {target, port} — should succeed
#       denied:            List of {target, port} — should timeout/fail

defaults:
  namespace: test
  timeout: 120

charts:
  # ──────────────────────────────────────────────────────────────
  # i2b2-wildfly: Backend with K8s NetworkPolicy
  # Uses real i2b2-wildfly image backed by a real i2b2-postgres dependency.
  # depends_on deploys i2b2-postgres first so the DB is available.
  # ──────────────────────────────────────────────────────────────
  i2b2-wildfly:
    namespace: i2b2
    timeout: 360
    values_file: ci/test-values/i2b2-wildfly.yaml
    depends_on:
      - i2b2-postgres
    pre_install:
      # Create the secret that wildfly expects for DB passwords.
      # The i2b2-pg image uses "demouser" as the default password for the i2b2 user.
      - kubectl create secret generic i2b2-wildfly-secret --from-literal=pg_pass=demouser --from-literal=ds_password=demouser --from-literal=ds_wd_pass=demouser --from-literal=ds_crc_pass=demouser --from-literal=ds_ont_pass=demouser --from-literal=ds_pm_pass=demouser --from-literal=ds_hive_pass=demouser -n i2b2 --dry-run=client -o yaml | kubectl apply -f -
    services:
      - port: 8080
    ingress:
      allowed:
        - labels:
            app.kubernetes.io/name: ingress-nginx
            app.kubernetes.io/component: controller
          port: 8080
          source_namespace: ingress-nginx
        - labels:
            app.kubernetes.io/name: i2b2-frontend
          port: 8080
      denied:
        - labels:
            app.kubernetes.io/name: unauthorized-app
          port: 8080
    egress:
      allowed:
        - target: e2e-i2b2-postgres
          port: 5432
      denied:
        - target: external
          port: 443

  # ──────────────────────────────────────────────────────────────
  # i2b2-frontend: Frontend with CiliumNetworkPolicy (L7 WAF mode)
  # Default values.yaml uses Cilium-format rules with enabled_l7_waf: true.
  # CI values file nulls out volumes/probes that need missing configmaps.
  # ──────────────────────────────────────────────────────────────
  i2b2-frontend:
    namespace: i2b2
    values_file: ci/test-values/i2b2-frontend-cilium.yaml
    services:
      - port: 80
    ingress:
      allowed:
        - labels:
            app.kubernetes.io/name: ingress-nginx
            app.kubernetes.io/component: controller
          port: 80
          source_namespace: ingress-nginx
      denied:
        - labels:
            app.kubernetes.io/name: unauthorized-app
          port: 80
    egress:
      denied:
        - target: external
          port: 443

  # ──────────────────────────────────────────────────────────────
  # i2b2-postgres: Database with K8s NetworkPolicy
  # Uses real i2b2-pg image which auto-initializes all schemas.
  # CI values file nulls out sidecar probes; uses tcpSocket readiness probe.
  # ──────────────────────────────────────────────────────────────
  i2b2-postgres:
    namespace: i2b2
    timeout: 300
    values_file: ci/test-values/i2b2-postgres.yaml
    pre_install:
      # The sidecar expects this secret to exist
      - kubectl create secret generic e2e-i2b2-postgres-secret --from-literal=postgres-password=testpass -n i2b2 --dry-run=client -o yaml | kubectl apply -f -
    services:
      - port: 5432
    ingress:
      allowed:
        - labels:
            app.kubernetes.io/name: i2b2-wildfly
          port: 5432
      denied:
        - labels:
            app.kubernetes.io/name: unauthorized-app
          port: 5432
          source_namespace: default
    egress:
      denied:
        - target: external
          port: 443

  # ──────────────────────────────────────────────────────────────
  # didata: Has both NetworkPolicy and CiliumNetworkPolicy
  # ──────────────────────────────────────────────────────────────
  didata:
    namespace: didata
    values:
      networkPolicy.enabled: "true"
      networkPolicy.enabled_l7_waf: "false"
      ingress.enabled: "false"
    services:
      - port: 8080

  # ──────────────────────────────────────────────────────────────
  # CRD-only or infra charts — skip deploy (no pods to test)
  # ──────────────────────────────────────────────────────────────
  cert-manager-crds:
    skip_deploy: true
  fluent-operator-crds:
    skip_deploy: true
  prometheus-operator-crds:
    skip_deploy: true
  trivy-operator-crds:
    skip_deploy: true
  chorus-priority-class:
    skip_deploy: true
  self-signed-issuer:
    skip_deploy: true
